<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Company Login — CampusHire</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0f1e;--surface:#111827;--card:#161f35;--border:#1e2d4a;--accent2:#06b6d4;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(6,182,212,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(10,15,30,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent2);}
    .nav-link{color:var(--muted);text-decoration:none;font-size:0.88rem;}
    .nav-link:hover{color:var(--text);}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;}
    .form-card{background:var(--card);border:1px solid rgba(6,182,212,0.2);border-radius:20px;padding:44px 48px;width:100%;max-width:440px;animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .form-header{margin-bottom:28px;}
    .form-header h2{font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:900;}
    .form-header p{color:var(--muted);margin-top:8px;font-size:0.9rem;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
    .form-group input{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.92rem;transition:border-color 0.2s,box-shadow 0.2s;}
    .form-group input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px rgba(6,182,212,0.12);}
    .form-group input::placeholder{color:var(--muted);}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),#0891b2);color:#fff;border:none;border-radius:10px;font-size:0.95rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:all 0.2s;}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(6,182,212,0.4);}
    .form-footer{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--muted);}
    .form-footer a{color:var(--accent2);text-decoration:none;}
    .msg{padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:18px;display:none;}
    .msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--success);}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger);}
    .msg.warning{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:#f59e0b;}
    @media(max-width:600px){nav{padding:16px 20px;}.form-card{padding:28px 20px;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Campus<span>Hire</span></a>
    <a href="company-register.html" class="nav-link">No account? Register →</a>
  </nav>
  <div class="page">
    <div class="form-card">
      <div class="form-header">
        <h2>Company Login 🏢</h2>
        <p>Access your company dashboard to post jobs and view applicants</p>
      </div>
      <div class="msg" id="msg"></div>
      <div class="form-group">
        <label>Official Email</label>
        <input type="email" id="email" placeholder="hr@company.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Your password"/>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="login()">Login to Dashboard →</button>
      <div class="form-footer">
        New company? <a href="company-register.html">Register here</a><br/>
        <a href="index.html" style="color:var(--muted);margin-top:8px;display:inline-block">← Back to Home</a>
      </div>
    </div>
  </div>
  <script>
    function showMsg(t,c){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+c;e.style.display='block';}
    function login(){
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('pass').value;
      if(!email||!pass){showMsg('Please fill in all fields.','error');return;}
      const btn=document.getElementById('loginBtn');
      btn.textContent='Logging in...'; btn.disabled=true; btn.style.opacity='0.7';
      setTimeout(()=>{
        const companies = JSON.parse(localStorage.getItem('ch_companies')||'[]');
        const co = companies.find(c=>c.email===email&&c.password===pass);
        if(!co){
          showMsg('Invalid email or password.','error');
          btn.textContent='Login to Dashboard →'; btn.disabled=false; btn.style.opacity='1'; return;
        }
        if(co.status==='pending'){
          showMsg('⏳ Your account is pending admin approval.','warning');
          btn.textContent='Login to Dashboard →'; btn.disabled=false; btn.style.opacity='1'; return;
        }
        if(co.status==='rejected'){
          showMsg('❌ Registration not approved. Contact placement cell.','error');
          btn.textContent='Login to Dashboard →'; btn.disabled=false; btn.style.opacity='1'; return;
        }
        localStorage.setItem('ch_loggedIn', JSON.stringify({id:co.id, role:'company', ts:Date.now()}));
        showMsg('Login successful! Redirecting...','success');
        setTimeout(()=>{ window.location.href='company-dashboard.html'; }, 900);
      },600);
    }
  </script>
</body>
</html>
