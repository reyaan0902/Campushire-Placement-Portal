<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — CampusHire</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0f1e;--surface:#111827;--card:#161f35;--border:#1e2d4a;--gold:#f59e0b;--text:#e2e8f0;--muted:#64748b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,158,11,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(10,15,30,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .logo{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.4rem;color:var(--text);text-decoration:none;}
    .logo span{color:var(--gold);}
    .nav-link{color:var(--muted);text-decoration:none;font-size:0.88rem;}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;}
    .form-card{background:var(--card);border:1px solid rgba(245,158,11,0.2);border-radius:20px;padding:44px 48px;width:100%;max-width:440px;animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .form-header{margin-bottom:32px;}
    .form-header h2{font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;}
    .form-header p{color:var(--muted);margin-top:8px;font-size:0.9rem;}
    .form-group{margin-bottom:20px;}
    .form-group label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}
    .form-group input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.92rem;transition:border-color 0.2s,box-shadow 0.2s;}
    .form-group input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,0.15);}
    .form-group input::placeholder{color:var(--muted);}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#f97316);color:#000;border:none;border-radius:10px;font-size:0.95rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(245,158,11,0.4);}
    .msg{padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:20px;display:none;}
    .msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;}
    .admin-note{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:14px;margin-bottom:24px;font-size:0.82rem;color:var(--gold);}
    @media(max-width:600px){nav{padding:16px 20px;}.form-card{padding:32px 24px;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Campus<span>Hire</span></a>
    <a href="student-login.html" class="nav-link">← Student Login</a>
  </nav>
  <div class="page">
    <div class="form-card">
      <div class="form-header">
        <h2>⚙️ Admin Panel</h2>
        <p>Placement Cell — Management Dashboard</p>
      </div>
      <div class="admin-note">🔑 Default credentials: <strong>admin / admin123</strong></div>
      <div class="msg" id="msg"></div>
      <div class="form-group">
        <label>Admin ID</label>
        <input type="text" id="adminId" placeholder="admin" value="admin"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="admin123" value="admin123"/>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="adminLogin()">Login to Admin Panel →</button>
    </div>
  </div>
  <script>
    function showMsg(t,c){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+c;e.style.display='block';}
    function adminLogin(){
      const id=document.getElementById('adminId').value.trim();
      const pw=document.getElementById('adminPass').value;
      const btn=document.getElementById('loginBtn');
      btn.textContent='Logging in...'; btn.disabled=true; btn.style.opacity='0.7';
      setTimeout(()=>{
        if(id==='admin'&&pw==='admin123'){
          localStorage.setItem('ch_loggedIn',JSON.stringify({id:'admin',role:'admin',ts:Date.now()}));
          showMsg('Login successful! Redirecting...','success');
          setTimeout(()=>{window.location.href='admin-dashboard.html';},900);
        } else {
          showMsg('Invalid Admin ID or Password.','error');
          btn.textContent='Login to Admin Panel →'; btn.disabled=false; btn.style.opacity='1';
        }
      },500);
    }
  </script>
</body>
</html>
