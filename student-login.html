<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login — CampusHire</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0f1e;--surface:#111827;--card:#161f35;--border:#1e2d4a;
      --accent:#3b82f6;--accent2:#06b6d4;--text:#e2e8f0;--muted:#64748b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
      background-size:50px 50px;pointer-events:none;z-index:0;
    }
    nav{
      position:fixed;top:0;width:100%;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 60px;background:rgba(10,15,30,0.85);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.4rem;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent);}
    .nav-link{color:var(--muted);text-decoration:none;font-size:0.88rem;}
    .nav-link:hover{color:var(--text);}
    .page{
      position:relative;z-index:1;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:100px 20px 60px;
    }
    .form-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:20px;padding:44px 48px;width:100%;max-width:440px;
      animation:fadeUp 0.5s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .form-header{margin-bottom:32px;}
    .form-header h2{font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;}
    .form-header p{color:var(--muted);margin-top:8px;font-size:0.9rem;}
    .form-group{margin-bottom:20px;}
    .form-group label{
      display:block;font-size:0.82rem;color:var(--muted);
      margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;
    }
    .form-group input{
      width:100%;padding:12px 16px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;
      font-size:0.92rem;transition:border-color 0.2s,box-shadow 0.2s;
    }
    .form-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
    .form-group input::placeholder{color:var(--muted);}
    .submit-btn{
      width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#6366f1);
      color:#fff;border:none;border-radius:10px;font-size:0.95rem;
      font-family:'Nunito',sans-serif;font-weight:500;cursor:pointer;
      transition:all 0.2s;box-shadow:0 8px 24px rgba(59,130,246,0.3);
    }
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(59,130,246,0.45);}
    .form-footer{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--muted);}
    .form-footer a{color:var(--accent);text-decoration:none;}
    .form-footer a:hover{text-decoration:underline;}
    .msg{padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:20px;display:none;}
    .msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:0.8rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .demo-btn{
      width:100%;padding:11px;background:transparent;color:var(--muted);
      border:1px solid var(--border);border-radius:10px;font-size:0.85rem;
      font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.2s;
    }
    .demo-btn:hover{border-color:var(--accent);color:var(--text);}
    @media(max-width:600px){nav{padding:16px 20px;}.form-card{padding:32px 24px;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Campus<span>Hire</span></a>
    <a href="student-register.html" class="nav-link">No account? Register →</a>
  </nav>
  <div class="page">
    <div class="form-card">
      <div class="form-header">
        <h2>Welcome Back 👋</h2>
        <p>Login to your student dashboard and check your placements</p>
      </div>
      <div class="msg" id="msg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="rahul@college.edu"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="login()">Login to Dashboard →</button>
      <div class="divider">or</div>
      <button class="demo-btn" onclick="demoLogin()">🚀 Try Demo Account</button>
      <div class="form-footer">
        New student? <a href="student-register.html">Create account</a>
      </div>
    </div>
  </div>
  <script>
    // Create a demo student on first load
    (function(){
      const students = JSON.parse(localStorage.getItem('ch_students')||'[]');
      if(!students.find(s=>s.email==='demo@college.edu')){
        students.push({
          id:'demo1',name:'Rahul Sharma',email:'demo@college.edu',
          phone:'9876543210',cgpa:8.4,course:'BTech',
          branch:'Computer Science',year:'3rd Year',
          skills:['Java','Python','HTML','CSS','JavaScript'],
          password:'demo123',resume:null,
          registeredAt:new Date().toISOString()
        });
        localStorage.setItem('ch_students',JSON.stringify(students));
      }
    })();

    function showMsg(text,type){
      const el=document.getElementById('msg');
      el.textContent=text;el.className='msg '+type;el.style.display='block';
    }
    function login(){
      const email=document.getElementById('email').value.trim();
      const pass=document.getElementById('password').value;
      if(!email||!pass){showMsg('Please fill in all fields.','error');return;}
      const btn=document.getElementById('loginBtn');
      btn.textContent='Logging in...'; btn.disabled=true; btn.style.opacity='0.7';
      setTimeout(()=>{
        const students=JSON.parse(localStorage.getItem('ch_students')||'[]');
        const student=students.find(s=>s.email===email&&s.password===pass);
        if(!student){
          showMsg('Invalid email or password.','error');
          btn.textContent='Login to Dashboard →'; btn.disabled=false; btn.style.opacity='1';
          return;
        }
        localStorage.setItem('ch_loggedIn',JSON.stringify({id:student.id,role:'student',ts:Date.now()}));
        showMsg('Login successful! Redirecting...','success');
        setTimeout(()=>{window.location.href='student-dashboard.html';},900);
      },600);
    }
    function demoLogin(){
      document.getElementById('email').value='demo@college.edu';
      document.getElementById('password').value='demo123';
      login();
    }
  </script>
</body>
</html>
