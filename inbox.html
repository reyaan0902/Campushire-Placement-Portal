<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inbox — CampusHire</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0f1e;--surface:#111827;--card:#161f35;--border:#1e2d4a;--accent:#3b82f6;--accent2:#06b6d4;--gold:#f59e0b;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 60px;background:rgba(10,15,30,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent);}
    .back-btn{padding:7px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;text-decoration:none;transition:all 0.2s;}
    .back-btn:hover{color:var(--text);border-color:var(--accent);}

    .layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 60px);margin-top:60px;position:relative;z-index:1;overflow:hidden;}

    /* SIDEBAR */
    .inbox-sidebar{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;height:100%;}
    .inbox-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);}
    .inbox-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;margin-bottom:12px;}
    .search-box{width:100%;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;}
    .search-box:focus{outline:none;border-color:var(--accent);}
    .search-box::placeholder{color:var(--muted);}
    .thread-list{flex:1;overflow-y:auto;}
    .thread-item{padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;display:flex;gap:12px;align-items:flex-start;}
    .thread-item:hover{background:rgba(59,130,246,0.05);}
    .thread-item.active{background:rgba(59,130,246,0.1);border-left:3px solid var(--accent);}
    .thread-item.unread .thread-name{font-weight:900;}
    .thread-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.9rem;flex-shrink:0;}
    .thread-info{flex:1;min-width:0;}
    .thread-name{font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .thread-preview{font-size:0.75rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .thread-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .thread-time{font-size:0.68rem;color:var(--muted);}
    .unread-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
    .empty-threads{padding:40px 20px;text-align:center;color:var(--muted);font-size:0.85rem;}

    /* CHAT */
    .chat-pane{display:flex;flex-direction:column;height:100%;overflow:hidden;}
    .chat-topbar{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:14px;}
    .chat-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.9rem;flex-shrink:0;}
    .chat-name{font-weight:800;font-size:0.95rem;}
    .chat-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;}
    .chat-messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px;min-height:0;}
    .msg-group{display:flex;flex-direction:column;gap:6px;}
    .msg-bubble{max-width:65%;padding:12px 16px;border-radius:14px;font-size:0.88rem;line-height:1.5;position:relative;}
    .msg-bubble.sent{background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px;}
    .msg-bubble.received{background:var(--card);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-radius:14px 14px 14px 4px;}
    .msg-time{font-size:0.65rem;opacity:0.65;margin-top:5px;}
    .msg-time.sent{text-align:right;}
    .msg-sender{font-size:0.7rem;color:var(--muted);font-weight:700;margin-bottom:3px;}
    .date-divider{text-align:center;font-size:0.72rem;color:var(--muted);font-weight:700;padding:8px 0;display:flex;align-items:center;gap:10px;}
    .date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .chat-input-area{padding:16px 28px;border-top:1px solid var(--border);background:var(--surface);}
    .input-row{display:flex;gap:10px;align-items:flex-end;}
    .chat-textarea{flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.88rem;resize:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color 0.2s;}
    .chat-textarea:focus{outline:none;border-color:var(--accent);}
    .chat-textarea::placeholder{color:var(--muted);}
    .send-btn{padding:11px 20px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.3);}
    .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    /* NEW MESSAGE BUTTON */
    .new-msg-btn{margin:12px 16px;padding:10px;background:rgba(59,130,246,0.1);color:var(--accent);border:1px solid rgba(59,130,246,0.25);border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;text-align:center;}
    .new-msg-btn:hover{background:rgba(59,130,246,0.18);}

    /* COMPOSE MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:480px;position:relative;}
    .modal-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;margin-bottom:20px;}
    .modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:0.72rem;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
    .form-group select,.form-group textarea,.form-group input{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.88rem;}
    .form-group select:focus,.form-group textarea:focus,.form-group input:focus{outline:none;border-color:var(--accent);}
    .form-group textarea{resize:vertical;min-height:80px;}
    .modal-send-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;}

    /* EMPTY STATE */
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:40px;}
    .chat-empty .ei{font-size:3rem;margin-bottom:16px;}

    @media(max-width:700px){.layout{grid-template-columns:1fr;}.inbox-sidebar{display:none;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Campus<span>Hire</span></a>
    <a id="backBtn" href="index.html" class="back-btn">← Back</a>
  </nav>

  <div class="layout">
    <!-- THREAD LIST -->
    <div class="inbox-sidebar">
      <div class="inbox-header">
        <div class="inbox-title">📧 Inbox</div>
        <input class="search-box" id="searchBox" placeholder="Search conversations..." oninput="filterThreads()"/>
      </div>
      <button class="new-msg-btn" id="newMsgBtn" onclick="openCompose()">✏️ New Message</button>
      <div class="thread-list" id="threadList"></div>
    </div>

    <!-- CHAT PANE -->
    <div class="chat-pane" id="chatPane">
      <div class="chat-empty">
        <div class="ei">💬</div>
        <p style="font-weight:700;font-size:0.95rem">Select a conversation</p>
        <p style="font-size:0.82rem;margin-top:6px">Messages from companies will appear here</p>
      </div>
    </div>
  </div>

  <!-- COMPOSE MODAL -->
  <div class="modal-overlay" id="composeModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeCompose()">×</button>
      <div class="modal-title">✏️ New Message</div>
      <div class="form-group">
        <label id="toLabel">To (Student)</label>
        <select id="toSelect"></select>
      </div>
      <div class="form-group">
        <label>Subject / Job Role</label>
        <input id="composeSubject" placeholder="e.g. Interview Invitation — SDE Intern"/>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="composeBody" placeholder="Write your message here..."></textarea>
      </div>
      <button class="modal-send-btn" onclick="sendNewMessage()">Send Message →</button>
    </div>
  </div>

  <script>
    // ── AUTH ──
    const auth = JSON.parse(localStorage.getItem('ch_loggedIn')||'null');
    if(!auth){ window.location.href='index.html'; }

    const role = auth.role; // 'student' | 'company' | 'admin'
    const myId = auth.id;

    // Back button
    const backMap={student:'student-dashboard.html',company:'company-dashboard.html',admin:'admin-dashboard.html'};
    document.getElementById('backBtn').href = backMap[role]||'index.html';

    // ── DATA HELPERS ──
    const getMessages = ()=>JSON.parse(localStorage.getItem('ch_messages')||'[]');
    const saveMessages = (m)=>localStorage.setItem('ch_messages',JSON.stringify(m));
    const getStudents  = ()=>JSON.parse(localStorage.getItem('ch_students')||'[]');
    const getCompanies = ()=>JSON.parse(localStorage.getItem('ch_companies')||'[]');
    const getApps      = ()=>JSON.parse(localStorage.getItem('ch_apps')||'[]');

    function myName(){
      if(role==='student') return getStudents().find(s=>s.id===myId)?.name||'Student';
      if(role==='company') return getCompanies().find(c=>c.id===myId)?.name||'Company';
      return 'Admin';
    }

    // ── AVATAR ──
    function hsh(s){return s.split('').reduce((a,c)=>a+c.charCodeAt(0),0);}
    function avatarEl(name,sz=40,cls=''){
      const bg=`hsl(${hsh(name)%360},50%,38%)`;
      return `<div class="${cls}" style="width:${sz}px;height:${sz}px;border-radius:50%;background:${bg};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:${sz*0.22}rem">${name.slice(0,2).toUpperCase()}</div>`;
    }
    function timeAgo(iso){const d=Date.now()-new Date(iso).getTime();return d<3600000?Math.floor(d/60000)+'m ago':d<86400000?Math.floor(d/3600000)+'h ago':Math.floor(d/86400000)+'d ago';}
    function fmtTime(iso){return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
    function fmtDate(iso){return new Date(iso).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}

    // ── THREADS ──
    // A thread is identified by a threadId = sorted pair of [senderId, receiverId]
    // Each message: { id, threadId, senderId, senderName, senderRole, receiverId, receiverName, receiverRole, subject, body, ts, readBy:[] }

    function getMyThreads(){
      const msgs=getMessages();
      const threadMap={};
      msgs.forEach(m=>{
        if(m.senderId!==myId && m.receiverId!==myId) return;
        if(!threadMap[m.threadId]){ threadMap[m.threadId]={threadId:m.threadId,msgs:[],otherId:m.senderId===myId?m.receiverId:m.senderId,otherName:m.senderId===myId?m.receiverName:m.senderName,otherRole:m.senderId===myId?m.receiverRole:m.senderRole,subject:m.subject}; }
        threadMap[m.threadId].msgs.push(m);
      });
      return Object.values(threadMap).map(t=>{
        t.msgs.sort((a,b)=>new Date(a.ts)-new Date(b.ts));
        t.lastMsg=t.msgs[t.msgs.length-1];
        t.unread=t.msgs.filter(m=>m.receiverId===myId&&!m.readBy.includes(myId)).length;
        return t;
      }).sort((a,b)=>new Date(b.lastMsg.ts)-new Date(a.lastMsg.ts));
    }

    let activeThreadId=null;
    let allThreads=[];

    function renderThreadList(){
      allThreads=getMyThreads();
      displayThreads(allThreads);
    }

    function displayThreads(threads){
      if(!threads.length){
        document.getElementById('threadList').innerHTML=`<div class="empty-threads">📭<br/><br/>No messages yet.<br/>${role==='company'?'Message a shortlisted student to get started.':'Companies will message you here when shortlisted.'}</div>`;
        return;
      }
      document.getElementById('threadList').innerHTML=threads.map(t=>`
        <div class="thread-item ${t.unread>0?'unread':''} ${t.threadId===activeThreadId?'active':''}" onclick="openThread('${t.threadId}')">
          ${avatarEl(t.otherName,40,'thread-avatar')}
          <div class="thread-info">
            <div class="thread-name">${t.otherName}</div>
            <div class="thread-preview">${t.lastMsg.body.slice(0,50)}${t.lastMsg.body.length>50?'...':''}</div>
          </div>
          <div class="thread-meta">
            <div class="thread-time">${timeAgo(t.lastMsg.ts)}</div>
            ${t.unread>0?`<div class="unread-dot"></div>`:''}
          </div>
        </div>`).join('');
    }

    function filterThreads(){
      const q=document.getElementById('searchBox').value.toLowerCase();
      displayThreads(allThreads.filter(t=>t.otherName.toLowerCase().includes(q)||t.subject.toLowerCase().includes(q)||(t.lastMsg.body||'').toLowerCase().includes(q)));
    }

    function openThread(threadId){
      activeThreadId=threadId;
      // Mark messages as read
      const msgs=getMessages();
      msgs.forEach(m=>{ if(m.threadId===threadId&&m.receiverId===myId&&!m.readBy.includes(myId)) m.readBy.push(myId); });
      saveMessages(msgs);
      renderThreadList();
      const thread=allThreads.find(t=>t.threadId===threadId);
      if(!thread) return;
      renderChat(thread);
    }

    function renderChat(thread){
      const msgs=thread.msgs;
      // Group by date
      let lastDate='';
      let html=`<div class="chat-topbar">
        ${avatarEl(thread.otherName,40,'chat-avatar')}
        <div><div class="chat-name">${thread.otherName}</div><div class="chat-sub">${thread.subject}</div></div>
      </div>
      <div class="chat-messages" id="chatMessages">`;
      msgs.forEach(m=>{
        const dateStr=fmtDate(m.ts);
        if(dateStr!==lastDate){ html+=`<div class="date-divider">${dateStr}</div>`; lastDate=dateStr; }
        const isMine=m.senderId===myId;
        html+=`<div class="msg-group">
          ${!isMine?`<div class="msg-sender">${m.senderName}</div>`:''}
          <div class="msg-bubble ${isMine?'sent':'received'}">${m.body.replace(/\n/g,'<br/>')}
            <div class="msg-time ${isMine?'sent':''}">${fmtTime(m.ts)}</div>
          </div></div>`;
      });
      html+=`</div>
      <div class="chat-input-area">
        <div class="input-row">
          <textarea class="chat-textarea" id="replyInput" placeholder="Type a message..." rows="1" onkeydown="sendOnEnter(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendReply('${thread.threadId}','${thread.otherId}','${thread.otherName}','${thread.otherRole}','${thread.subject}')">Send ↑</button>
        </div>
      </div>`;
      document.getElementById('chatPane').innerHTML=html;
      // Scroll to bottom
      const cm=document.getElementById('chatMessages');
      if(cm) cm.scrollTop=cm.scrollHeight;
    }

    function sendActiveReply(){ const t=window._activeThread; if(!t) return; sendReply(t.threadId,t.otherId,t.otherName,t.otherRole,t.subject); }
    function sendOnEnter(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); document.querySelector('.send-btn')?.click(); } }
    function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

    function sendReply(threadId, receiverId, receiverName, receiverRole, subject){
      const input=document.getElementById('replyInput');
      const body=input.value.trim();
      if(!body) return;
      const msgs=getMessages();
      msgs.push({id:'msg_'+Date.now(),threadId,senderId:myId,senderName:myName(),senderRole:role,receiverId,receiverName,receiverRole,subject,body,ts:new Date().toISOString(),readBy:[myId]});
      saveMessages(msgs);
      input.value=''; input.style.height='auto';
      renderThreadList();
      const thread=allThreads.find(t=>t.threadId===threadId)||getMyThreads().find(t=>t.threadId===threadId);
      if(thread) renderChat({...thread, msgs: getMessages().filter(m=>m.threadId===threadId).sort((a,b)=>new Date(a.ts)-new Date(b.ts))});
    }

    // ── COMPOSE NEW ──
    function openCompose(){
      const modal=document.getElementById('composeModal');
      const sel=document.getElementById('toSelect');
      sel.innerHTML='';
      if(role==='company'){
        // Company: can message students who applied to their jobs
        const myJobs=JSON.parse(localStorage.getItem('ch_jobs')||'[]').filter(j=>j.companyId===myId);
        const jobIds=myJobs.map(j=>j.id);
        const myApps=getApps().filter(a=>jobIds.includes(a.jobId));
        const stuIds=[...new Set(myApps.map(a=>a.studentId))];
        const studs=getStudents().filter(s=>stuIds.includes(s.id));
        if(!studs.length){ alert('No students have applied to your jobs yet.'); return; }
        studs.forEach(s=>{ const opt=document.createElement('option'); opt.value=s.id+'|'+s.name+'|student'; opt.textContent=s.name+' — '+s.branch; sel.appendChild(opt); });
        document.getElementById('toLabel').textContent='To (Student)';
      } else if(role==='student'){
        // Student: can message companies they applied to
        const myApps=getApps().filter(a=>a.studentId===myId);
        const coNames=[...new Set(myApps.map(a=>a.company))];
        const cos=getCompanies().filter(c=>coNames.includes(c.name)&&c.status==='approved');
        if(!cos.length){ alert('Apply to a job first before messaging a company.'); return; }
        cos.forEach(c=>{ const opt=document.createElement('option'); opt.value=c.id+'|'+c.name+'|company'; opt.textContent=c.name; sel.appendChild(opt); });
        document.getElementById('toLabel').textContent='To (Company)';
      } else {
        // Admin: can message any student or company
        getStudents().forEach(s=>{ const opt=document.createElement('option'); opt.value=s.id+'|'+s.name+'|student'; opt.textContent='[Student] '+s.name; sel.appendChild(opt); });
        getCompanies().filter(c=>c.status==='approved').forEach(c=>{ const opt=document.createElement('option'); opt.value=c.id+'|'+c.name+'|company'; opt.textContent='[Company] '+c.name; sel.appendChild(opt); });
        document.getElementById('toLabel').textContent='To';
      }
      modal.style.display='flex';
    }
    function closeCompose(){ document.getElementById('composeModal').style.display='none'; }

    function sendNewMessage(){
      const toVal=document.getElementById('toSelect').value;
      const subject=document.getElementById('composeSubject').value.trim();
      const body=document.getElementById('composeBody').value.trim();
      if(!toVal||!subject||!body){ alert('Please fill all fields.'); return; }
      const [receiverId,receiverName,receiverRole]=toVal.split('|');
      const threadId=[myId,receiverId].sort().join('_');
      const msgs=getMessages();
      msgs.push({id:'msg_'+Date.now(),threadId,senderId:myId,senderName:myName(),senderRole:role,receiverId,receiverName,receiverRole,subject,body,ts:new Date().toISOString(),readBy:[myId]});
      saveMessages(msgs);
      document.getElementById('composeSubject').value='';
      document.getElementById('composeBody').value='';
      closeCompose();
      renderThreadList();
      activeThreadId=threadId;
      setTimeout(()=>openThread(threadId),100);
    }

    // ── SEED DEMO MESSAGES ──
    (function(){
      if(getMessages().length>0) return;
      const studs=getStudents();
      const cos=getCompanies().filter(c=>c.status==='approved');
      if(!studs.length||!cos.length) return;
      const st=studs[0], co=cos[0];
      const threadId=[st.id,co.id].sort().join('_');
      const demo=[
        {id:'dm1',threadId,senderId:co.id,senderName:co.name,senderRole:'company',receiverId:st.id,receiverName:st.name,receiverRole:'student',subject:'Interview Invitation — '+co.name,body:'Dear '+st.name+',\n\nCongratulations! We have reviewed your application and are pleased to invite you for an online interview.\n\nDate: 20th March 2026\nTime: 11:00 AM\nMode: Google Meet\n\nPlease confirm your availability.\n\nBest regards,\nHR Team',ts:new Date(Date.now()-86400000*2).toISOString(),readBy:[co.id]},
        {id:'dm2',threadId,senderId:st.id,senderName:st.name,senderRole:'student',receiverId:co.id,receiverName:co.name,receiverRole:'company',subject:'Interview Invitation — '+co.name,body:'Dear HR Team,\n\nThank you for the invitation. I confirm my availability on 20th March at 11:00 AM.\n\nLooking forward to the interview!\n\nRegards,\n'+st.name,ts:new Date(Date.now()-86400000).toISOString(),readBy:[st.id,co.id]},
        {id:'dm3',threadId,senderId:co.id,senderName:co.name,senderRole:'company',receiverId:st.id,receiverName:st.name,receiverRole:'student',subject:'Interview Invitation — '+co.name,body:'Great! The meeting link will be shared 30 minutes before the interview. Good luck! 🎯',ts:new Date(Date.now()-3600000*4).toISOString(),readBy:[co.id]},
      ];
      saveMessages(demo);
    })();

    // ── INIT ──
    try{ renderThreadList(); }catch(e){ console.error("Inbox error:",e); }

    // Seed compose button label based on role
    if(role==='student') document.getElementById('newMsgBtn').textContent='✏️ Message a Company';
    else if(role==='company') document.getElementById('newMsgBtn').textContent='✏️ Message a Student';
    else document.getElementById('newMsgBtn').textContent='✏️ New Message';

    // Auto refresh every 10s
    setInterval(()=>{ renderThreadList(); },10000);
  </script>
</body>
</html>
